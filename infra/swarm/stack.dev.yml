version: "3.9"

# Single-node Swarm stack for local development.
# Build images first: make build-all
# Deploy: make swarm-deploy ENV=dev

networks:
  newsroom_net:
    driver: overlay
    attachable: true

volumes:
  postgres_data:
  tempo_data:
  caddy_data:

services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: newsroom
      POSTGRES_USER: newsroom
      POSTGRES_PASSWORD: newsroom_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [newsroom_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsroom"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  redis:
    image: redis/redis-stack:latest
    networks: [newsroom_net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092
      - --schema-registry-addr=0.0.0.0:8081
    networks: [newsroom_net]
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  vault:
    image: hashicorp/vault:latest
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_LOCAL_CONFIG: '{"disable_mlock": true}'
      SKIP_SETCAP: "true"
    networks: [newsroom_net]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    configs:
      - source: tempo_config
        target: /etc/tempo.yaml
    volumes:
      - tempo_data:/var/tempo
    networks: [newsroom_net]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  prometheus:
    image: prom/prometheus:latest
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    networks: [newsroom_net]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    networks: [newsroom_net]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  caddy:
    image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
    configs:
      - source: caddy_config
        target: /etc/caddy/Caddyfile
    volumes:
      - caddy_data:/data
    networks: [newsroom_net]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  # ── Application services ──────────────────────────────────────────────────

  auth:
    image: newsroom/auth:dev
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_SERVICE_NAME: auth
    networks: [newsroom_net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s

  learner:
    image: newsroom/learner-server:dev
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_SERVICE_NAME: learner-server
    networks: [newsroom_net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s

  learner-ingest:
    image: newsroom/learner-ingest:dev
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      CONFIG_DIR: /config
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_SERVICE_NAME: learner-ingest
    networks: [newsroom_net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s

  agent:
    image: newsroom/agent:dev
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      LEARNER_ADDR: learner:8080
      ANALYTICS_ADDR: analytics:8080
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_SERVICE_NAME: agent
    networks: [newsroom_net]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s

  moderation:
    image: newsroom/moderation:dev
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      LEARNER_ADDR: learner:8080
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_SERVICE_NAME: moderation
    networks: [newsroom_net]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s

  analytics:
    image: newsroom/analytics:dev
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_SERVICE_NAME: analytics
    networks: [newsroom_net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s

  sanity:
    image: newsroom/sanity:dev
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_SERVICE_NAME: sanity-connector
    networks: [newsroom_net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s

configs:
  tempo_config:
    file: ../tempo/tempo.yaml
  prometheus_config:
    file: ../prometheus/prometheus.yml
  caddy_config:
    file: ../caddy/Caddyfile
