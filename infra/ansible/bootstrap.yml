---
# Bootstrap one or more Contabo VPS nodes into a Docker Swarm cluster.
# Idempotent: safe to re-run. Detects existing swarm membership.
#
# Usage:
#   cd infra/ansible
#   cp inventory.example.ini inventory.ini && $EDITOR inventory.ini
#   cp group_vars/all.yml.example group_vars/all.yml && $EDITOR group_vars/all.yml
#   ansible-playbook bootstrap.yml --ask-become-pass
#
# After this completes:
#   1. Create Docker secrets (see ops/DEPLOY.md).
#   2. docker stack deploy -c infra/swarm/stack.prod.yml newsroom

- name: Common host hardening + Docker install
  hosts: swarm
  become: true
  roles:
    - common
    - firewall
    - docker
    - observability

- name: Initialise Swarm cluster on first manager
  hosts: swarm_managers[0]
  become: true
  roles:
    - swarm_manager

- name: Join additional managers
  hosts: swarm_managers[1:]
  become: true
  roles:
    - swarm_join_manager

- name: Join worker nodes
  hosts: swarm_workers
  become: true
  roles:
    - swarm_join_worker

- name: Resolve each Swarm node's own ID (so labelling works regardless of inventory naming)
  hosts: swarm
  become: true
  tasks:
    - name: Get this node's Swarm node ID
      ansible.builtin.command: docker info --format '{% raw %}{{ .Swarm.NodeID }}{% endraw %}'
      register: swarm_node_id
      changed_when: false

    - name: Stash node ID as host fact
      ansible.builtin.set_fact:
        swarm_node_id_self: "{{ swarm_node_id.stdout }}"

- name: Label nodes for placement constraints (infra / app)
  hosts: swarm_managers[0]
  become: true
  tasks:
    - name: Label each node by its own Swarm node ID
      ansible.builtin.command: >
        docker node update
        --label-add role={{ hostvars[item].role_label | default('app') }}
        {{ hostvars[item].swarm_node_id_self }}
      loop: "{{ groups['swarm'] }}"
      changed_when: true

    - name: Capture swarm status
      ansible.builtin.command: docker node ls
      changed_when: false
      register: nodes_out

    - name: Show swarm topology
      ansible.builtin.debug:
        var: nodes_out.stdout_lines

    - name: Assert all expected nodes are present in swarm
      ansible.builtin.assert:
        that:
          - nodes_out.stdout is search(hostvars[item].swarm_node_id_self[:12])
        fail_msg: "Node {{ item }} (id {{ hostvars[item].swarm_node_id_self }}) missing from `docker node ls` output."
      loop: "{{ groups['swarm'] }}"
