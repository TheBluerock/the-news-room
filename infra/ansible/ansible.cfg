[defaults]
inventory = inventory.ini
roles_path = roles
# SECURITY TRADE-OFF: host_key_checking = False skips SSH host identity verification.
# This exposes the bootstrap run to MITM if an attacker can intercept traffic to the VPS IP.
# Accepted only because:
#   - target VPSes have stable IPs that we just provisioned and know first-hand;
#   - bootstrap runs once on a fresh host (no known_hosts baseline yet);
#   - all hosts listed in inventory.ini must be trusted nodes we control.
# For production / long-lived operations prefer:
#   - host_key_checking = True with pre-seeded ~/.ssh/known_hosts entries, OR
#   - ssh-keyscan into known_hosts during provisioning and revert this flag.
host_key_checking = False
retry_files_enabled = False
stdout_callback = yaml
forks = 5
timeout = 30

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
