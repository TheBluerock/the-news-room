---
- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker apt repo
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Install Docker engine + compose plugin
  ansible.builtin.apt:
    name:
      - "docker-ce={{ docker_version }}"
      - "docker-ce-cli={{ docker_version }}"
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Configure Docker daemon (live-restore, log rotation, default address pool)
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    mode: "0644"
    content: |
      {
        "live-restore": true,
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "20m",
          "max-file": "5"
        },
        "default-address-pools": [
          {"base": "{{ swarm_default_addr_pool }}", "size": {{ swarm_default_addr_pool_subnet_size }}}
        ],
        "metrics-addr": "127.0.0.1:9323",
        "experimental": false
      }
  notify: Restart docker

- name: Ensure docker service started + enabled
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Add admin to docker group
  ansible.builtin.user:
    name: "{{ admin_user }}"
    groups: docker
    append: true
