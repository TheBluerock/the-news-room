---
- name: Reset UFW to defaults
  community.general.ufw:
    state: reset

- name: Default deny incoming
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Default allow outgoing
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Allow SSH (rate-limited)
  community.general.ufw:
    rule: limit
    port: 22
    proto: tcp

- name: Allow HTTP/HTTPS (Caddy)
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: [80, 443]

- name: Allow Swarm cluster TCP ports (internal node-to-node)
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
    src: "{{ hostvars[node].ansible_host }}"
  loop: "{{ swarm_ports_tcp }}"
  loop_control:
    loop_var: item
  vars:
    nodes: "{{ groups['swarm'] }}"
  when: false  # Outer-loop friendly version below.

# Per-node allow rules: each cluster node may reach each peer on swarm ports.
- name: Allow Swarm TCP ports from each peer
  community.general.ufw:
    rule: allow
    port: "{{ port }}"
    proto: tcp
    src: "{{ hostvars[peer].ansible_host }}"
  loop: "{{ swarm_ports_tcp | product(groups['swarm']) | list }}"
  loop_control:
    loop_var: combo
  vars:
    port: "{{ combo.0 }}"
    peer: "{{ combo.1 }}"
  when: hostvars[peer].ansible_host != ansible_default_ipv4.address

- name: Allow Swarm UDP ports from each peer
  community.general.ufw:
    rule: allow
    port: "{{ port }}"
    proto: udp
    src: "{{ hostvars[peer].ansible_host }}"
  loop: "{{ swarm_ports_udp | product(groups['swarm']) | list }}"
  loop_control:
    loop_var: combo
  vars:
    port: "{{ combo.0 }}"
    peer: "{{ combo.1 }}"
  when: hostvars[peer].ansible_host != ansible_default_ipv4.address

- name: Enable UFW
  community.general.ufw:
    state: enabled
    logging: low
