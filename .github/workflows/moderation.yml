name: Moderation Service

on:
  push:
    branches: [main]
    paths: ["services/moderation/**", "infra/schemas/**"]
  pull_request:
    paths: ["services/moderation/**", "infra/schemas/**"]

env:
  IMAGE: ghcr.io/${{ github.repository }}/moderation

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: cd services/moderation && pip install -r requirements.txt
      - run: cd services/moderation && ruff check . && mypy .
      - run: cd services/moderation && pytest --cov=. --cov-fail-under=80 -q

  build:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with: {registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}"}
      - id: meta
        uses: docker/metadata-action@v5
        with: {images: "${{ env.IMAGE }}", tags: "type=sha,prefix="}
      - uses: docker/build-push-action@v6
        with: {context: services/moderation, push: true, tags: "${{ steps.meta.outputs.tags }}"}

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run migrations
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SWARM_HOST }}
          username: ${{ secrets.SWARM_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          script: |
            PROD_DB_URL="${{ secrets.PROD_DB_URL }}" make migrate-up ENV=prod
      - name: Deploy to Swarm
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SWARM_HOST }}
          username: ${{ secrets.SWARM_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          script: |
            docker service update \
              --image ${{ needs.build.outputs.image_tag }} \
              --update-order start-first \
              newsroom_moderation
