name: Agent Service

on:
  push:
    branches: [main]
    paths: ["services/agent/**", "proto/**", "infra/schemas/**"]
  pull_request:
    paths: ["services/agent/**", "proto/**", "infra/schemas/**"]

env:
  IMAGE: ghcr.io/${{ github.repository }}/agent

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: cd services/agent && pip install -r requirements.txt
      - name: Lint
        run: cd services/agent && ruff check . && mypy .
      - name: Test (coverage ≥ 80%)
        run: cd services/agent && pytest --cov=. --cov-fail-under=80 -q
      - name: Schema validation tests
        run: cd services/agent && pytest tests/test_schemas.py -v

  build:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: type=sha,prefix=
      - uses: docker/build-push-action@v6
        with:
          context: services/agent
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy-staging:
    # Single image deployed as three market-scoped services (AGENT_MARKET env var)
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: staging
    strategy:
      matrix:
        market: [italy, usa, china]
    steps:
      - uses: actions/checkout@v4
      - name: Deploy agent-${{ matrix.market }} to staging
        run: |
          helm upgrade --install newsroom-agent-${{ matrix.market }} infra/helm/newsroom \
            --set service=agent \
            --set nameOverride=agent-${{ matrix.market }} \
            --set image.tag=${{ needs.build.outputs.image_tag }} \
            --set env.AGENT_MARKET=${{ matrix.market }} \
            --namespace staging --wait

  deploy-production:
    if: github.ref == 'refs/heads/main'
    needs: [deploy-staging, build]
    runs-on: ubuntu-latest
    environment:
      name: production
    strategy:
      matrix:
        market: [italy, usa, china]
    steps:
      - name: Canary deploy agent-${{ matrix.market }} (Argo Rollouts — 5%→50%→100%)
        run: |
          kubectl argo rollouts set image newsroom-agent-${{ matrix.market }} \
            agent=${{ needs.build.outputs.image_tag }} \
            --namespace production
