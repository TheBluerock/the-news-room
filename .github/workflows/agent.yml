name: Agent Service

on:
  push:
    branches: [main]
    paths: ["services/agent/**", "proto/**", "infra/schemas/**"]
  pull_request:
    paths: ["services/agent/**", "proto/**", "infra/schemas/**"]

env:
  IMAGE: ghcr.io/${{ github.repository }}/agent

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: cd services/agent && pip install -r requirements.txt
      - name: Lint
        run: cd services/agent && ruff check .
      - name: Type check
        run: cd services/agent && mypy --ignore-missing-imports pipeline graph.py
      - name: Test (coverage threshold)
        env:
          MIN_COVERAGE: "50"  # baseline = covers core (circuit/llm/memory/corrections/rate_limit at 100%). Bump to 75 once graph/publisher/quality covered.
        run: cd services/agent && pytest --cov=pipeline --cov=graph --cov-fail-under=$MIN_COVERAGE -q

  build:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: type=sha,prefix=
      - uses: docker/build-push-action@v6
        with:
          context: services/agent
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    # Single image deployed as three market-scoped Swarm services (AGENT_MARKET env var)
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        market: [italy, usa, china]
    steps:
      - name: Deploy agent-${{ matrix.market }} to Swarm
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SWARM_HOST }}
          username: ${{ secrets.SWARM_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          script: |
            docker service update \
              --image ${{ needs.build.outputs.image_tag }} \
              --update-order start-first \
              newsroom_agent-${{ matrix.market }}
