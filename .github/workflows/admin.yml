name: Admin App

on:
  push:
    branches: [main]
    paths: ["admin/**"]
  pull_request:
    paths: ["admin/**"]

env:
  IMAGE: ghcr.io/${{ github.repository }}/admin

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: admin/package-lock.json
      - run: cd admin && npm ci
      - name: Type check
        run: cd admin && npx svelte-kit sync && npx tsc --noEmit
      - name: Lint
        run: cd admin && npx eslint src --ext .ts,.svelte --max-warnings 0 || true

  build:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: type=sha,prefix=
      - uses: docker/build-push-action@v6
        with:
          context: admin
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy-staging:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4
      - name: Fetch JWT public key from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: secret/data/newsroom/auth jwt_public_key | JWT_PUBLIC_KEY
      - name: Deploy to staging
        run: |
          helm upgrade --install newsroom-admin infra/helm/newsroom \
            --set service=admin \
            --set image.tag=${{ needs.build.outputs.image_tag }} \
            --namespace staging --wait

  deploy-production:
    if: github.ref == 'refs/heads/main'
    needs: [deploy-staging, build]
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Canary deploy (Argo Rollouts — 5%→50%→100%, auto-rollback)
        run: |
          kubectl argo rollouts set image newsroom-admin \
            admin=${{ needs.build.outputs.image_tag }} \
            --namespace production
