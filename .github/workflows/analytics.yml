name: Analytics Service

on:
  push:
    branches: [main]
    paths: ["services/analytics/**", "proto/**", "infra/migrations/**"]
  pull_request:
    paths: ["services/analytics/**", "proto/**", "infra/migrations/**"]

env:
  IMAGE: ghcr.io/${{ github.repository }}/analytics

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version: "1.22"}
      - run: cd services/analytics && go test -race -coverprofile=coverage.out ./...
      - name: Check coverage ≥ 75%
        run: |
          cd services/analytics
          coverage=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          awk "BEGIN{exit ($coverage < 75)}" || (echo "Coverage $coverage% < 75%" && exit 1)
      - uses: golangci/golangci-lint-action@v6
        with: {working-directory: services/analytics}

  build:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with: {registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}"}
      - id: meta
        uses: docker/metadata-action@v5
        with: {images: "${{ env.IMAGE }}", tags: "type=sha,prefix="}
      - uses: docker/build-push-action@v6
        with: {context: services/analytics, push: true, tags: "${{ steps.meta.outputs.tags }}"}

  migrate-and-deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: secret/data/newsroom/analytics postgres_dsn | DB_URL
      - run: make migrate-up ENV=staging
      - run: helm upgrade --install newsroom-analytics infra/helm/newsroom --set service=analytics --set image.tag=${{ needs.build.outputs.image_tag }} --namespace staging --wait

  deploy-production:
    if: github.ref == 'refs/heads/main'
    needs: migrate-and-deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: kubectl argo rollouts set image newsroom-analytics analytics=${{ needs.build.outputs.image_tag }} --namespace production
