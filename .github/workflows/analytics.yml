name: Analytics Service

on:
  push:
    branches: [main]
    paths: ["services/analytics/**", "proto/**", "infra/migrations/**"]
  pull_request:
    paths: ["services/analytics/**", "proto/**", "infra/migrations/**"]

env:
  IMAGE: ghcr.io/${{ github.repository }}/analytics

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version: "1.26"}
      - run: cd services/analytics && go test -race -timeout=10m -coverprofile=coverage.out ./...
      - name: Check coverage threshold
        env:
          MIN_COVERAGE: "25"  # baseline = current achieved. Untested: grpc, vault, telemetry, RunPublishedConsumer (Kafka loop). Bump to 75 once those are covered.
        run: |
          cd services/analytics
          coverage=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${coverage}% (min: ${MIN_COVERAGE}%)"
          awk -v cov="$coverage" -v min="$MIN_COVERAGE" "BEGIN{exit (cov < min)}" \
            || (echo "Coverage ${coverage}% < ${MIN_COVERAGE}%" && exit 1)
      - uses: golangci/golangci-lint-action@v6
        with: {working-directory: services/analytics}

  build:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with: {registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}"}
      - id: meta
        uses: docker/metadata-action@v5
        with: {images: "${{ env.IMAGE }}", tags: "type=sha,prefix="}
      - uses: docker/build-push-action@v6
        with: {context: services/analytics, push: true, tags: "${{ steps.meta.outputs.tags }}"}

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run migrations
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SWARM_HOST }}
          username: ${{ secrets.SWARM_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          script: |
            PROD_DB_URL="${{ secrets.PROD_DB_URL }}" make migrate-up ENV=prod
      - name: Deploy to Swarm
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SWARM_HOST }}
          username: ${{ secrets.SWARM_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          script: |
            docker service update \
              --image ${{ needs.build.outputs.image_tag }} \
              --update-order start-first \
              newsroom_analytics
